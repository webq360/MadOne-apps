name: omnicare_app
description: A new Flutter project.

publish_to: "none"

version: 5.1.1+8

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  change_app_package_name: ^1.1.0
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.9
  get: ^4.6.6
  internet_connection_checker: ^1.0.0+1
  connectivity_plus: ^5.0.2
  http: ^1.1.0
  provider: ^6.1.1
  url_launcher: ^6.2.3
  flutter_launcher_icons: ^0.13.1
  badges: ^3.1.2
  permission_handler: ^11.1.0
  image_picker: ^1.1.2
  shared_preferences: ^2.2.2
  carousel_slider: ^5.0.0
  # flutter_phone_direct_caller: 
  timeline_tile: ^2.0.0
  shimmer: ^3.0.0
  http_parser: ^4.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.1
  path_provider: ^2.1.2
  cached_network_image: ^3.3.1
  loading_animation_widget: ^1.2.0+4

dev_dependencies:
  build_runner: ^2.4.8

  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/company/
    - assets/icons/
    - assets/appbar_icons/
    - assets/navbar_icons/
    - assets/products/
    - assets/order/
    - assets/cart/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.jpg"
  min_sdk_android: 21
